name: Publish

on:
  push:
    branches:
      - main
    paths:
      - 'feature-controls/**'

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: '094954420758'

jobs:
  build:
    if: github.run_number != 1
    name: CDP-build-workflow
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 #7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Test code and Create Test Coverage Reports
        run: |
          npm ci
          npm test

      - name: Validate feature controls
        run: |
          curl -s https://raw.githubusercontent.com/DEFRA/grants-config-broker/main/src/routes/api/feature-control/feature-control-schemas.js -o scripts/feature-control-schemas.temp.js
          node scripts/validate-feature-controls.js
          rm scripts/feature-control-schemas.temp.js

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f #8.2.1
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build and Publish
        uses: DEFRA/cdp-build-action/build@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
